<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      padding: 16px;
      color: #1a1a2e;
      background: #fafafa;
    }
    h1 {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 12px;
      color: #7c3aed;
    }
    .url-display {
      font-size: 11px;
      color: #666;
      word-break: break-all;
      background: #f0f0f0;
      padding: 8px;
      border-radius: 6px;
      margin-bottom: 12px;
      max-height: 48px;
      overflow: hidden;
    }
    label {
      font-size: 12px;
      font-weight: 500;
      display: block;
      margin-bottom: 4px;
      color: #444;
    }
    select {
      width: 100%;
      padding: 6px 8px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 12px;
      margin-bottom: 12px;
      background: white;
    }
    button {
      width: 100%;
      padding: 10px;
      background: #7c3aed;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: #6d28d9; }
    button:disabled {
      background: #c4b5fd;
      cursor: not-allowed;
    }
    .status {
      margin-top: 10px;
      font-size: 12px;
      text-align: center;
      min-height: 18px;
    }
    .status.success { color: #059669; }
    .status.error { color: #dc2626; }
    .status.loading { color: #7c3aed; }
  </style>
</head>
<body>
  <h1>Save as Source Note</h1>
  <div class="url-display" id="url-display">Loading...</div>

  <label for="media-type">Media type (auto-detected)</label>
  <select id="media-type">
    <option value="">Auto-detect</option>
    <option value="Videos">Videos</option>
    <option value="Books">Books</option>
    <option value="Courses">Courses</option>
    <option value="Other">Other</option>
  </select>

  <button id="save-btn">Save to Obsidian</button>
  <div class="status" id="status"></div>

  <script src="popup.js"></script>
</body>
</html>
